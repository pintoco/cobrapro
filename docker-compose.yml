version: '3.9'

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cobrapro_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cobrapro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cobrapro_pass}
      POSTGRES_DB: ${POSTGRES_DB:-cobrapro_prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cobrapro} -d ${POSTGRES_DB:-cobrapro_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Backend (NestJS) ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cobrapro_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override DATABASE_URL to use the internal Docker service name
      DATABASE_URL: postgresql://${POSTGRES_USER:-cobrapro}:${POSTGRES_PASSWORD:-cobrapro_pass}@postgres:5432/${POSTGRES_DB:-cobrapro_prod}?schema=public
      NODE_ENV: production
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Frontend (Next.js) ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Browsers call the backend directly — must be the host-accessible URL
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    container_name: cobrapro_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
    name: cobrapro_postgres_data
